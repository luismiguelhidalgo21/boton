<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Curiosidades Chilenas ✨</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Paleta Rosada y Comfy */
            --bg-color: #FEF9F8; /* Crema rosado muy tenue */
            --card-bg: #FFFFFF;
            --text-main: #5D4037; /* Marrón suave, menos agresivo que el negro */
            --text-secondary: #A1887F;
            
            --pink-primary: #FFD1DC; /* Rosa pastel suave */
            --pink-hover: #FFC0CB;   /* Rosa un poco más intenso al tacto */
            --pink-accent: #E57373;  /* Coral suave para detalles */
            
            --border-comfort: #F4EAE6;
            
            --font-comfy: 'Quicksand', sans-serif;
            
            /* Curvas muy pronunciadas para suavidad */
            --radius-card: 30px;
            --radius-btn: 50px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-comfy);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            /* Degradado radial suave de fondo */
            background-image: radial-gradient(circle at center, #FFFFFF 0%, #FEF9F8 100%);
        }

        /* Tarjeta estilo "Almohada" o Nube */
        .comfy-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 480px;
            border-radius: var(--radius-card);
            /* Sombras extremadamente suaves y difusas */
            box-shadow: 0 20px 40px rgba(255, 209, 220, 0.2), 0 10px 15px rgba(0, 0, 0, 0.01);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 2px solid var(--border-comfort);
            transition: transform 0.3s ease;
        }

        header {
            padding: 40px 30px 15px;
            text-align: center;
        }

        .subtitle {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--pink-accent);
            font-weight: 700;
            margin-bottom: 10px;
            display: block;
        }

        h1 {
            font-weight: 700;
            font-size: 1.7rem;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        /* Contenedor del Dato */
        .fact-stage {
            padding: 30px 35px 50px;
            min-height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            touch-action: pan-y;
        }

        /* Tipografía de dato suavizada */
        #fact-text {
            font-weight: 500;
            font-size: 1.25rem;
            line-height: 1.5;
            text-align: center;
            color: var(--text-main);
            /* Animación más lenta y fluida */
            transition: opacity 0.6s ease, transform 0.7s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* Efecto de desvanecimiento suave */
        .fact-hidden {
            opacity: 0;
            transform: scale(0.96);
        }

        footer {
            padding: 0 35px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }

        /* Botón Rosado y Súper Redondeado */
        #generate-btn {
            background-color: var(--pink-primary);
            color: #795548; /* Marrón contrastante suave */
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: var(--radius-btn);
            font-family: var(--font-comfy);
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 8px 20px rgba(255, 209, 220, 0.4);
            position: relative;
            overflow: hidden;
        }

        /* Brillo sutil al pasar el mouse (en desktop) */
        #generate-btn:hover {
            background-color: var(--pink-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 209, 220, 0.5);
        }

        /* Efecto de compresión suave al tocar */
        #generate-btn:active {
            transform: translateY(1px) scale(0.98);
            box-shadow: 0 4px 10px rgba(255, 209, 220, 0.3);
        }
        
        /* Pequeño destello de luz interno al pulsar */
        #generate-btn::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 100px; height: 100px;
            background: rgba(255,255,255,0.5);
            opacity: 0;
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            transition: transform 0.5s, opacity 0.5s;
        }
        
        #generate-btn:active::after {
            transform: translate(-50%, -50%) scale(4);
            opacity: 1;
            transition: 0s;
        }

        .meta-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            border-top: 2px solid var(--border-comfort);
            padding-top: 20px;
        }

        #counter-text {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        #mute-toggle {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-family: var(--font-comfy);
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.3s;
            padding: 5px 10px;
            border-radius: 20px;
        }

        #mute-toggle:hover { color: var(--pink-accent); background-color: rgba(255,209,220,0.1); }
        #mute-toggle.active { opacity: 0.5; }

    </style>
</head>
<body>

    <div class="comfy-card">
        <header>
            <span class="subtitle">Descubre algo nuevo ✨</span>
            <h1>Curiosidades Chilenas</h1>
        </header>
        
        <div class="fact-stage" id="touch-area">
            <p id="fact-text">Toca el botón rosa o desliza aquí suavemente para empezar.</p>
        </div>
        
        <footer>
            <button id="generate-btn">Siguiente Curiosidad 💖</button>
            <div class="meta-controls">
                <span id="counter-text">Quedan: 50 por ver</span>
                <button id="mute-toggle">
                    <span id="mute-icon">🔊</span> Sonido
                </button>
            </div>
        </footer>
    </div>

    <script>
        // --- BASE DE DATOS (Mismos 50 datos históricos) ---
        const chileanFacts = [
            "La momia artificial más antigua del mundo no es egipcia, es la momia Chinchorro del norte de Chile (aprox. 5050 a.C.).",
            "Chile tiene el récord del terremoto más fuerte jamás registrado en la historia: Valdivia en 1960, con una magnitud de 9.5.",
            "Bernardo O'Higgins, el 'Padre de la Patria', era de ascendencia irlandesa y vasca.",
            "La verdadera Independencia de Chile se proclamó y juró el 12 de febrero de 1818, ¡no el 18 de septiembre!",
            "El pueblo Mapuche resistió la conquista española durante más de 300 años.",
            "La bandera chilena es 21 años más antigua que la bandera del estado de Texas, a pesar de su gran parecido.",
            "Chile reclama soberanía sobre una porción de la Antártica oficialmente desde 1940.",
            "El monitor peruano Huáscar, capturado en la Guerra del Pacífico, es el buque de guerra flotante más antiguo de su tipo.",
            "La Batalla naval de Iquique (1879) fue una derrota militar, pero Arturo Prat se convirtió en el máximo héroe nacional.",
            "En 1520, la expedición de Magallanes descubrió el Estrecho que hoy lleva su nombre, avistando Chile.",
            "Pedro de Valdivia fundó Santiago el 12 de febrero de 1541 a los pies del Cerro Huelén (Santa Lucía).",
            "Inés de Suárez tuvo un papel crucial en la defensa de Santiago en 1541 contra el cacique Michimalonco.",
            "La Isla de Pascua (Rapa Nui) fue incorporada al territorio chileno recién en 1888.",
            "El 'Abrazo de Maipú' entre San Martín y O'Higgins selló la independencia de Chile en 1818.",
            "El temido corsario inglés Francis Drake atacó y saqueó el puerto de Valparaíso en el año 1578.",
            "La primera mujer médico de Sudamérica fue la chilena Eloísa Díaz, graduada en 1887.",
            "Diego Portales organizó la República en el siglo XIX, dictó la Constitución de 1833, pero nunca fue Presidente.",
            "El origen de la palabra 'Chile' podría venir del aymara 'chilli' (donde termina la tierra) o del canto del pájaro trile.",
            "Chile fue el primer país del mundo en elegir democráticamente a un presidente marxista: Salvador Allende en 1970.",
            "La actual Constitución chilena fue redactada en 1980 durante la dictadura militar, con múltiples reformas posteriores.",
            "El rescate de los 33 mineros en 2010 fue visto en vivo por más de mil millones de personas.",
            "Durante la colonia, Chile era considerada una Capitanía pobre debido a los enormes gastos bélicos en la Araucanía.",
            "El estratega mapuche Lautaro fue paje de Valdivia, aprendiendo así las tácticas españolas para luego combatirlos.",
            "La Isla Robinson Crusoe inspiró la novela de Daniel Defoe, basada en la historia del marinero Alexander Selkirk.",
            "Gabriela Mistral fue la primera latinoamericana en ganar el Premio Nobel de Literatura en 1945.",
            "Pablo Neruda organizó el viaje del barco Winnipeg en 1939, salvando a más de 2.000 refugiados españoles.",
            "Durante la fiebre del oro de California (1848), muchos chilenos fundaron allí una zona conocida como 'Chilecito'.",
            "Valparaíso fue el puerto comercial más importante del Pacífico Sur antes de la apertura del Canal de Panamá.",
            "El primer ferrocarril de Chile se inauguró en 1851 entre Caldera y Copiapó.",
            "El Desierto de Atacama es el lugar no polar más árido de la Tierra.",
            "En 1866, durante la Guerra Hispano-Sudamericana, la escuadra española bombardeó Valparaíso.",
            "El himno nacional de Chile solía tener estrofas muy agresivas contra España, eliminadas en 1847.",
            "La icónica figura del 'Roto Chileno' fue homenajeada por su valentía en la Guerra contra la Confederación Perú-Boliviana.",
            "En el plebiscito de 1988, la opción 'NO' ganó, marcando el inicio del retorno a la democracia.",
            "El cóndor y el huemul del escudo nacional representan el lema oficial: 'Por la razón o la fuerza'.",
            "Los restos de la Esmeralda siguen en el fondo del mar en Iquique y el lugar es un Santuario Nacional.",
            "En 1859, mineros de Copiapó se rebelaron contra el gobierno central e incluso acuñaron sus propias monedas.",
            "Las mujeres chilenas lograron el derecho a voto presidencial recién en el año 1949.",
            "El Palacio de La Moneda fue construido originalmente en la época colonial para fabricar dinero.",
            "En 1962, Chile organizó el Mundial de la FIFA y la selección nacional logró el tercer lugar histórico.",
            "El cómic 'Condorito' fue creado por Pepo en 1949 como respuesta a una película de Walt Disney.",
            "La flor nacional de Chile es el Copihue, una hermosa enredadera con forma de campana.",
            "El pueblo Selk'nam sufrió un terrible genocidio a fines del siglo XIX a manos de estancieros.",
            "En 1881, Chile cedió sus pretensiones sobre la Patagonia oriental para asegurar el control del Estrecho de Magallanes.",
            "Michelle Bachelet hizo historia en 2006 al convertirse en la primera mujer Presidenta de Chile.",
            "La austral ciudad de Punta Arenas fue fundada en 1848 originalmente como una colonia penal.",
            "En 1860, un abogado francés se autoproclamó 'Rey de la Araucanía y la Patagonia'.",
            "El grito de Arturo Prat: '¡Al abordaje, muchachos!', se enseña como símbolo de valentía en todo el país.",
            "Durante la Segunda Guerra Mundial, Chile se mantuvo neutral casi todo el tiempo, rompiendo con el Eje recién en 1943.",
            "La 'Cueca' fue declarada oficialmente como la danza nacional de Chile mediante decreto en 1979."
        ];

        // --- LÓGICA (Cero repeticiones) ---
        let availableFacts = [...chileanFacts];

        const factTextElement = document.getElementById('fact-text');
        const generateBtn = document.getElementById('generate-btn');
        const counterText = document.getElementById('counter-text');
        const muteToggle = document.getElementById('mute-toggle');
        const muteIcon = document.getElementById('mute-icon');

        // --- Sintetizador Comfy: Sonido grave y sutil ("Thump") ---
        let isMuted = false;
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        const initAudio = () => {
            if(!audioCtx) audioCtx = new AudioContext();
        }

        const playComfySound = () => {
            if (isMuted || !audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            // Onda sinusoidal para el sonido más puro y suave posible
            osc.type = 'sine'; 
            
            // Frecuencias muy bajas para un sonido "acolchado"
            osc.frequency.setValueAtTime(110, audioCtx.currentTime); // Nota La baja
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.12);

            // Volumen bajo, decaimiento suave
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime); 
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);

            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.12);
        };

        muteToggle.addEventListener('click', () => {
            initAudio();
            isMuted = !isMuted;
            muteToggle.classList.toggle('active', isMuted);
            muteIcon.textContent = isMuted ? '🔇' : '🔊';
            if(!isMuted) playComfySound();
        });

        // --- Función de visualización fluida ---
        const generateFact = () => {
            initAudio();
            playComfySound();

            if (availableFacts.length === 0) availableFacts = [...chileanFacts];

            const randomIndex = Math.floor(Math.random() * availableFacts.length);
            const selectedFact = availableFacts.splice(randomIndex, 1)[0];

            // Animación de salida suave
            factTextElement.classList.add('fact-hidden');

            setTimeout(() => {
                factTextElement.textContent = selectedFact;
                counterText.textContent = `Quedan: ${availableFacts.length} por ver`;
                
                factTextElement.offsetHeight; // Forzar repintado

                // Animación de entrada suave
                factTextElement.classList.remove('fact-hidden');
            }, 400); // Un poco más lento para ser más comfy
        };

        generateBtn.addEventListener('click', generateFact);

        // Soporte Swipe para móviles
        const touchArea = document.getElementById('touch-area');
        let touchStartX = 0;
        let touchEndX = 0;

        touchArea.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, {passive: true});

        touchArea.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            if (Math.abs(touchStartX - touchEndX) > 50) {
                generateFact(); // Funciona deslizando suavemente
            }
        }, {passive: true});

    </script>
</body>
</html>
